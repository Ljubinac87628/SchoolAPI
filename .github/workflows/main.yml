name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build
      run: dotnet build

    - name: Docker build
      run: docker build -t my-api .

    - name: Setup .NET
      uses: actions/setup-dotnet@v3     
	  
    - name: Restore dependencies
      run:  dotnet restore

    - name: Publish project
      run:  dotnet publish -c Release -o out
